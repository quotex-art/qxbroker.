<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotex - Technical Support Center</title>
<link rel="icon" type="image/svg+xml" href="imgs/quotex-io-1.svg">
<style>
:root {
  --bg-primary: #0b0d14;
  --bg-secondary: #14161f;
  --bg-tertiary: #1c1e2a;
  --bg-card: #1e212e;
  --border: #252836;
  --border-light: #2e3242;
  --accent: #9f062d;
  --accent-hover: #b8073a;
  --accent-dim: rgba(159,6,45,0.12);
  --critical: #e74c3c;
  --critical-dim: rgba(231,76,60,0.12);
  --success: #27ae60;
  --warning: #f39c12;
  --info: #3498db;
  --gold: #f1c40f;
  --text-primary: #f0f0f0;
  --text-secondary: rgba(255,255,255,0.5);
  --text-dim: rgba(255,255,255,0.22);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --font: 'Segoe UI', Tahoma, Arial, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

/* ─── TOPBAR ─── */
.topbar {
  height: 56px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}

.topbar-logo {
  display: flex;
  align-items: center;
  flex: 1;
}
.topbar-logo-link {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
}
.topbar-logo-img { height: 28px; width: auto; }
.topbar-logo-text {
  display: flex;
  flex-direction: column;
  gap: 1px;
  border-left: 1px solid rgba(255,255,255,0.08);
  padding-left: 14px;
}
.topbar-logo-text .dept-name {
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.2px;
  line-height: 1.2;
}
.topbar-logo-text .dept-sub {
  font-size: 9px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  letter-spacing: 1px;
  line-height: 1.2;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.tb-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-secondary); padding: 6px;
  border-radius: var(--radius-xs);
  transition: all 0.2s;
  display: flex; align-items: center;
  font-family: var(--font);
  font-size: 12px;
  gap: 4px;
}
.tb-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }
.tb-btn svg { width: 16px; height: 16px; }

/* ─── MAIN ─── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── CHAT AREA ─── */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* System alert banner */
.system-alert {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  font-size: 11px;
  background: rgba(231,76,60,0.06);
  border-bottom: 1px solid rgba(231,76,60,0.15);
  color: var(--text-secondary);
  flex-shrink: 0;
}
.system-alert svg { width: 14px; height: 14px; flex-shrink: 0; }
.system-alert strong { color: var(--critical); }

/* Chat header */
.chat-header {
  padding: 12px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.agent-info { display: flex; align-items: center; gap: 10px; }

.agent-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg-tertiary);
  border: 2px solid #2e3038;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative;
}
.agent-avatar::after {
  content: '';
  width: 9px; height: 9px;
  background: var(--success);
  border: 2px solid var(--bg-secondary);
  border-radius: 50%;
  position: absolute;
  bottom: -2px; left: -2px;
}
.agent-avatar svg { width: 20px; height: 20px; }

.agent-meta { line-height: 1.3; }
.agent-name { font-size: 14px; font-weight: 600; color: #fff; }
.agent-title { font-size: 11px; color: var(--text-secondary); }
.agent-seniority {
  display: inline-block;
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  background: rgba(241,196,15,0.15);
  color: var(--gold);
  margin-left: 6px;
  font-weight: 600;
}

.typing-indicator {
  font-size: 11px; color: var(--accent);
  display: none;
  align-items: center; gap: 6px;
  padding: 0 20px 8px;
  position: relative;
  z-index: 2;
}

.dot-pulse { display: inline-flex; align-items: center; gap: 3px; }
.dot-pulse span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: dotPulse 1.4s ease-in-out infinite both;
}
.dot-pulse span:nth-child(1) { animation-delay: 0s; }
.dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
.dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
.typing-indicator.active { display: flex; margin-top: 2px; }
.typing-dots { display: inline-flex; gap: 2px; }
.typing-dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  animation: typingBounce 1.4s infinite ease-in-out both;
}
.typing-dots span:nth-child(1) { animation-delay: 0s; }
.typing-dots span:nth-child(2) { animation-delay: 0.16s; }
.typing-dots span:nth-child(3) { animation-delay: 0.32s; }
@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.header-status {
  display: flex;
  align-items: center;
  gap: 12px;
}
.read-status {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-dim);
}
.read-status .read { color: var(--info); }

.chat-header-actions { display: flex; align-items: center; gap: 4px; }

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scroll-behavior: smooth;
  position: relative;
  background: 
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(159,6,45,0.015) 0%, transparent 70%),
    var(--bg-primary);
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb {
  background: rgba(159,6,45,0.3);
  border-radius: 4px;
  transition: background 0.2s;
}
.chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(159,6,45,0.5); }
.chat-messages::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('imgs/quotex_logo.svg');
  background-repeat: repeat;
  background-size: 180px 45px;
  opacity: 0.03;
  animation: watermarkFloat 40s linear infinite;
  pointer-events: none;
  z-index: 0;
}
.chat-messages::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 50% 40% at 50% 50%, transparent 0%, var(--bg-primary) 100%);
  pointer-events: none;
  z-index: 1;
}
@keyframes watermarkFloat {
  0% { transform: translateY(0) translateX(0); }
  25% { transform: translateY(-10px) translateX(5px); }
  50% { transform: translateY(0) translateX(0); }
  75% { transform: translateY(10px) translateX(-5px); }
  100% { transform: translateY(0) translateX(0); }
}

.date-sep {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  margin: 4px 0 12px;
  position: relative;
  z-index: 2;
}
.date-sep::before,
.date-sep::after {
  content: '';
  position: absolute;
  top: 50%; width: 35%;
  height: 1px;
  background: var(--border);
}
.date-sep::before { left: 0; }
.date-sep::after { right: 0; }
.date-sep span { background: var(--bg-primary); padding: 0 10px; }

/* System messages */
.sys-msg {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  padding: 6px 0;
  margin: 2px 0;
  position: relative;
  z-index: 2;
}
.sys-msg strong { color: var(--critical); }
.sys-msg .accent { color: var(--info); }

/* Message rows */
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  margin-bottom: 3px;
  opacity: 0;
  animation: msgSlideIn 0.25s ease forwards;
  position: relative;
  z-index: 2;
}
@keyframes msgSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg-tertiary); border: 1.5px solid #2e3038;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.msg-avatar svg { width: 14px; height: 14px; }
.msg-avatar.user-av { background: #3a1a24; border-color: #4a2030; }
.msg-avatar.user-av svg { color: rgba(255,255,255,0.6); }

.bubble {
  max-width: 66%;
  padding: 11px 15px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.6;
  position: relative;
  word-wrap: break-word;
}
.bubble.agent {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: #d8d8d8;
  border-bottom-right-radius: 4px;
}
.bubble.user {
  background: var(--accent);
  color: #fff;
  border-bottom-left-radius: 4px;
}
.bubble .highlight {
  color: var(--info);
  font-weight: 600;
}
.bubble .em-critical {
  color: var(--critical);
  font-weight: 600;
}

.bubble-time {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.bubble.user .bubble-time { justify-content: flex-end; color: rgba(255,255,255,0.5); }
.check { color: rgba(255,255,255,0.5); font-size: 11px; }
.check.read { color: var(--info); }

/* Attachment preview */
.attach-preview {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: var(--radius-xs);
  padding: 8px 10px;
  margin-top: 6px;
  max-width: 220px;
  cursor: pointer;
  transition: background 0.15s;
}
.attach-preview:hover { background: rgba(255,255,255,0.08); }
.attach-preview .icon { font-size: 18px; }
.attach-preview .fname { font-size: 11px; color: #ccc; word-break: break-all; }
.attach-preview .fsize { font-size: 9px; color: var(--text-dim); }

/* Quick actions (critical) */
.quick-actions {
  display: flex;
  gap: 6px;
  padding: 8px 20px 2px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.qa-btn {
  display: none;
  padding: 6px 12px;
  font-size: 11px;
  font-family: var(--font);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}
.qa-btn.show { display: inline-block; }
.qa-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.qa-btn.danger {
  border-color: rgba(231,76,60,0.25);
  color: var(--critical);
}
.qa-btn.danger:hover {
  background: var(--critical);
  color: #fff;
  border-color: var(--critical);
}

/* Input bar */
.chat-input-bar {
  margin: 0 16px 16px;
  padding: 10px 16px;
  background: rgba(22,24,36,0.55);
  backdrop-filter: blur(16px) saturate(1.2);
  -webkit-backdrop-filter: blur(16px) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  position: relative;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
}
.chat-input-bar::before {
  content: '';
  position: absolute;
  top: -1px; left: 50%;
  transform: translateX(-50%);
  width: 40%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(159,6,45,0.4), rgba(159,6,45,0.6), rgba(159,6,45,0.4), transparent);
}

.chat-input-inner {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0 4px 0 14px;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.chat-input-inner:focus-within {
  border-color: rgba(159,6,45,0.4);
  box-shadow: 0 0 0 3px rgba(159,6,45,0.08), inset 0 0 0 1px rgba(159,6,45,0.06);
}

.ci-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-dim); padding: 6px;
  border-radius: 6px;
  transition: all 0.2s;
  display: flex; align-items: center;
  font-size: 16px;
  flex-shrink: 0;
}
.ci-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }
.ci-btn svg { width: 17px; height: 17px; }

#fileInput { display: none; }

.chat-input-wrap { flex: 1; }

.chat-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  padding: 10px 0;
  color: var(--text-primary);
  font-size: 13.5px;
  font-family: var(--font);
  text-align: left;
  line-height: 1.5;
}
.chat-input::placeholder { color: rgba(255,255,255,0.18); }

.send-btn {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent) 0%, #b8073a 100%);
  border: none;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(159,6,45,0.2);
  position: relative;
}
.send-btn:hover {
  background: linear-gradient(135deg, #b8073a 0%, #d40a47 100%);
  box-shadow: 0 4px 16px rgba(159,6,45,0.35);
  transform: translateY(-1px);
}
.send-btn:active { transform: scale(0.92) translateY(0); }
.send-btn svg {
  width: 17px; height: 17px;
  color: #fff;
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.send-btn:hover svg { transform: translateX(1px) scale(1.05); }

/* Right sidebar */
.right-sidebar {
  width: 260px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  padding: 14px 12px;
  overflow-y: auto;
}
.right-sidebar::-webkit-scrollbar { width: 4px; }
.right-sidebar::-webkit-scrollbar-track { background: transparent; }
.right-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
.right-sidebar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
.rs-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.rs-card + .rs-card { margin-top: 8px; }
.rs-header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
}
.rs-header h4 {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
}
.rs-img {
  display: block;
  width: 100%;
  height: auto;
}

.rs-social-links {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 8px 10px 10px;
}
.rs-social-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 6px;
  text-decoration: none;
  transition: all 0.2s ease;
}
.rs-social-link:hover {
  transform: translateX(2px);
}
.rs-social-link svg {
  width: 15px; height: 15px;
  color: rgba(255,255,255,0.25);
  flex-shrink: 0;
  transition: all 0.2s ease;
}
.rs-social-name {
  font-size: 11px;
  color: var(--text-secondary);
  flex: 1;
  transition: all 0.2s ease;
}
.rs-social-link:hover .rs-social-name { color: #fff; }
.rs-social-count {
  font-size: 9px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}
/* Facebook */
.rs-social-link:nth-child(1):hover {
  background: rgba(24,119,242,0.12);
  box-shadow: 0 0 16px rgba(24,119,242,0.15), 0 0 0 1px rgba(24,119,242,0.08);
}
.rs-social-link:nth-child(1):hover svg {
  color: #1877F2;
  filter: drop-shadow(0 0 4px rgba(24,119,242,0.4));
}
/* Instagram */
.rs-social-link:nth-child(2):hover {
  background: rgba(228,64,95,0.12);
  box-shadow: 0 0 16px rgba(228,64,95,0.15), 0 0 0 1px rgba(228,64,95,0.08);
}
.rs-social-link:nth-child(2):hover svg {
  color: #E4405F;
  filter: drop-shadow(0 0 4px rgba(228,64,95,0.4));
}
/* Telegram */
.rs-social-link:nth-child(3):hover {
  background: rgba(0,136,204,0.12);
  box-shadow: 0 0 16px rgba(0,136,204,0.15), 0 0 0 1px rgba(0,136,204,0.08);
}
.rs-social-link:nth-child(3):hover svg {
  color: #0088cc;
  filter: drop-shadow(0 0 4px rgba(0,136,204,0.4));
}

.rs-footer {
  margin-top: auto;
  padding: 12px 4px 4px;
  text-align: center;
}
.rs-site-link {
  display: block;
  font-size: 11px;
  color: rgba(255,255,255,0.15);
  text-decoration: none;
  letter-spacing: 0.5px;
  transition: color 0.2s;
  margin-bottom: 4px;
}
.rs-site-link:hover { color: rgba(255,255,255,0.4); }
.rs-copy {
  font-size: 8px;
  color: rgba(255,255,255,0.08);
  letter-spacing: 0.3px;
}

.rs-info-content {
  padding: 10px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.rs-info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
}
.rs-info-label { color: var(--text-dim); }
.rs-info-value { color: var(--text-primary); font-weight: 500; }

/* ─── LANGUAGE SWITCHER ─── */
.lang-switcher {
  display: flex;
  gap: 3px;
  margin-right: 8px;
}
.lang-btn {
  padding: 3px 7px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 10px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
  line-height: 1.4;
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.lang-btn:hover { color: var(--text-primary); border-color: var(--border-light); }
.lang-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ─── RTL OVERRIDES ─── */
html[dir="rtl"] .chat-header .agent-info { flex-direction: row-reverse; }
html[dir="rtl"] .chat-header .agent-meta { text-align: right; }
html[dir="rtl"] .agent-seniority { margin-left: 0; margin-right: 6px; }
html[dir="rtl"] .msg-row { flex-direction: row; }
html[dir="rtl"] .msg-row.user { flex-direction: row-reverse; }
html[dir="rtl"] .bubble.agent { border-bottom-right-radius: 14px; border-bottom-left-radius: 4px; }
html[dir="rtl"] .bubble.user { border-bottom-left-radius: 14px; border-bottom-right-radius: 4px; }
html[dir="rtl"] .msg-row.user .bubble-time { justify-content: flex-start; }
html[dir="rtl"] .typing-indicator { flex-direction: row-reverse; }
html[dir="rtl"] .quick-actions { flex-direction: row-reverse; }
html[dir="rtl"] .chat-input-bar { flex-direction: row-reverse; }
html[dir="rtl"] .chat-input-inner { flex-direction: row-reverse; }
html[dir="rtl"] .topbar-logo-link { flex-direction: row-reverse; }

html[dir="rtl"] .topbar-actions { flex-direction: row-reverse; }
html[dir="rtl"] .right-sidebar { border-left: none; border-right: 1px solid var(--border); }
html[dir="rtl"] .rs-social-link:hover { transform: translateX(-2px); }

html[dir="rtl"] .chat-header-actions { flex-direction: row-reverse; }
html[dir="rtl"] .lang-switcher { margin-right: 0; margin-left: 8px; }
html[dir="rtl"] .right-sidebar { border-right: 1px solid var(--border); border-left: none; }
@media (max-width: 900px) {
  html[dir="rtl"] .right-sidebar { right: auto; left: 0; transform: translateX(-100%); }
  html[dir="rtl"] .right-sidebar.open { transform: translateX(0); }
}

/* ─── RESPONSIVE ─── */
.tb-menu { display: none; }

@media (max-width: 900px) {
  .tb-menu { display: flex; }
  .topbar-logo-text .dept-sub { display: none; }
  .right-sidebar {
    position: fixed;
    top: 56px; right: 0;
    width: 280px;
    height: calc(100vh - 56px);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: -4px 0 24px rgba(0,0,0,0.4);
    border-left: 1px solid var(--border);
  }
  .right-sidebar.open { transform: translateX(0); }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    backdrop-filter: blur(2px);
  }
  .sidebar-overlay.open { display: block; }
}

@media (max-width: 700px) {
  .topbar { padding: 0 12px; }
  .topbar-logo-text .dept-sub { display: none; }
  .chat-messages { padding: 14px 12px; }
  .chat-input-bar { margin: 0 10px 10px; padding: 8px 12px; border-radius: 12px; }
  .bubble { max-width: 88%; font-size: 13px; padding: 9px 13px; }
  .chat-header { padding: 10px 14px; }
  .system-alert { padding: 6px 14px; font-size: 10px; }
  .quick-actions { padding: 6px 12px 0; gap: 4px; }
  .qa-btn { font-size: 10px; padding: 5px 10px; }
}
/* Splash screen */
.splash {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: radial-gradient(ellipse at center, #0d0f18 0%, #080a12 50%, #05060d 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: splashFadeOut 0.5s ease 2.4s forwards;
}
.splash::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 40%, rgba(159,6,45,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.splash-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  animation: splashScaleIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.splash-logo {
  width: min(72px, 14vw);
  height: auto;
  filter: drop-shadow(0 0 30px rgba(159,6,45,0.25));
  animation: splashLogoPulse 2s ease-in-out infinite;
}
@keyframes splashLogoPulse {
  0%, 100% { filter: drop-shadow(0 0 30px rgba(159,6,45,0.25)); }
  50% { filter: drop-shadow(0 0 50px rgba(159,6,45,0.45)); }
}
.splash-dots {
  display: flex;
  gap: 10px;
}
.splash-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(159,6,45,0.15);
  animation: dotGlow 1.4s ease-in-out infinite;
}
.splash-dot:nth-child(1) { animation-delay: 0s; }
.splash-dot:nth-child(2) { animation-delay: 0.25s; }
.splash-dot:nth-child(3) { animation-delay: 0.5s; }
@keyframes dotGlow {
  0%, 100% {
    background: rgba(159,6,45,0.2);
    box-shadow: 0 0 0 rgba(159,6,45,0);
    transform: scale(1);
  }
  50% {
    background: #9f062d;
    box-shadow: 0 0 14px rgba(159,6,45,0.6);
    transform: scale(1.35);
  }
}
@keyframes splashScaleIn {
  from { opacity: 0; transform: scale(0.7) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes splashFadeOut {
  from { opacity: 1; }
  to { opacity: 0; pointer-events: none; }
}
</style>

    agent2_role: 'Agent Principal de Vérification de Sécurité',
    agent2_dept: 'Division Sécurité des Comptes et Conformité — Quotex',
  }
};

var currentLang = localStorage.getItem('quotex_lang') || 'en';

function t(key) {
  var lang = translations[currentLang] || translations['en'];
  return lang[key] !== undefined ? lang[key] : (translations['en'][key] || key);
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('quotex_lang', lang);
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
  });
  location.reload();
}

function applyTranslations() {
  document.title = t('title');
  document.querySelector('.dept-name').textContent = t('dept_name');
  document.querySelector('.dept-sub').textContent = t('dept_sub');
  document.querySelector('.agent-name').childNodes[0].textContent = t('agent_name') + ' ';
  document.querySelector('.agent-title').textContent = t('agent_title');
  document.querySelector('.typing-indicator span:first-child').textContent = t('typing');
  document.querySelector('.chat-input').placeholder = t('input_placeholder');
  var h4s = document.querySelectorAll('.rs-header h4');
  if (h4s[0]) h4s[0].textContent = t('sidebar_about');
  if (h4s[1]) h4s[1].textContent = t('sidebar_social');
}

// ─── Splash ───
setTimeout(function() {
  var s = document.getElementById('splash');
  if (s) s.remove();
  initChat();
}, 2800);

// ─── Initial manager message ───
function initChat() {
  var msgs = document.getElementById('msgs');
  var today = new Date();
  var locale = currentLang === 'ar' ? 'ar-SA' : currentLang === 'fr' ? 'fr-FR' : 'en-US';
  var dateStr = today.toLocaleDateString(locale, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  var sep = document.createElement('div');
  sep.className = 'date-sep';
  sep.innerHTML = '<span>' + dateStr + '</span>';
  msgs.appendChild(sep);

  showTyping();
  setTimeout(function() {
    hideTyping();
    addMsg(
      '<div style="font-weight:600;font-size:14px;color:#fff;margin-bottom:6px;">' + t('msg_security_title') + '</div>' +
      '<div style="margin-bottom:8px;">' + t('msg_dear') + '</div>' +
      '<div style="margin-bottom:8px;">' + t('msg_intro') + '</div>' +
      '<div style="margin-bottom:8px;">' + t('msg_body') + '</div>' +
      '<div style="margin-bottom:8px;">' + t('msg_action') + '</div>' +
      '<div style="margin-bottom:6px;">' + t('msg_assurance') + '</div>' +
      '<div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:8px;margin-top:6px;font-size:12px;color:var(--text-secondary);">' +
        t('msg_regards') + '<br>' +
        '<strong style="color:#fff;">Alexander Vance</strong><br>' +
        t('agent_title') + '<br>' +
        'Quotex' +
      '</div>',
      'agent'
    );
    // Second message from dedicated security agent
    showTyping();
    setTimeout(function() {
      hideTyping();
      showQuickActions();
      addMsg(
        '<div style="font-weight:600;font-size:14px;color:#fff;margin-bottom:6px;">' + t('agent2_header') + '</div>' +
        '<div style="margin-bottom:8px;">' + t('agent2_greeting') + '</div>' +
        '<div style="margin-bottom:8px;">' + t('agent2_body') + '</div>' +
        '<div style="margin-bottom:6px;">' + t('agent2_steps') + '</div>' +
        '<div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:8px;margin-top:6px;font-size:12px;color:var(--text-secondary);">' +
          t('agent2_regards') + '<br>' +
          '<strong style="color:#fff;">' + t('agent2_name') + '</strong><br>' +
          t('agent2_role') + '<br>' +
          t('agent2_dept') +
        '</div>',
        'agent'
      );
    }, 2800);
  }, 2200);
}

// ─── Sidebar ───
function toggleSidebar() {
  document.getElementById('rightSidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ─── Utilities ───
function now() {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
}

const agentAvatar = `<span style="color:#fff;font-size:13px;font-weight:700;line-height:28px;">A</span>`;
const userSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`;

// ─── Messages ───
function addMsg(text, type, extra) {
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = `msg-row ${type}`;
  let extraHtml = '';
  if (extra) extraHtml = extra;
  row.innerHTML = `
    <div class="msg-avatar ${type === 'user' ? 'user-av' : ''}" style="${type === 'agent' ? 'background:#9f062d;' : ''}">${type === 'agent' ? agentAvatar : userSVG}</div>
    <div>
      <div class="bubble ${type}">${text}${extraHtml ? '<br>' + extraHtml : ''}</div>
      <div class="bubble-time">${now()}${type === 'user' ? ' <span class="check read">✓✓</span>' : ''}</div>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function addSysMsg(html) {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ─── Send ───
function sendMsg() {
  var inp = document.getElementById('msgInput');
  var text = inp.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  inp.value = '';
  hideQuickActions();
  showTyping();
  setTimeout(function() {
    hideTyping();
    var agentReplies = [
      'Thank you for your message. Your request is being processed urgently.',
      'Your request has been received. I will update you as soon as verification is complete.',
      'I am working on this now. I will get back to you within minutes.',
      'Your notes have been recorded. I will follow up with the processing team.',
    ];
    addMsg(agentReplies[Math.floor(Math.random() * agentReplies.length)], 'agent');
    showQuickActions();
  }, 1600);
}

function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMsg();
}

function sendCritical(text) {
  document.getElementById('msgInput').value = text;
  sendMsg();
  addSysMsg('Urgent action has been sent to the support team');
}

// ─── Typing ───
function showTyping() {
  document.getElementById('typingIndicator').classList.add('active');
}
function hideTyping() {
  document.getElementById('typingIndicator').classList.remove('active');
}

// ─── Quick actions ───
function hideQuickActions() {
  document.querySelectorAll('.qa-btn').forEach(b => b.classList.remove('show'));
}
function showQuickActions() {
  document.querySelectorAll('.qa-btn').forEach(b => b.classList.add('show'));
}

// ─── File attachment ───
function handleFiles(files) {
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var icon = f.type.startsWith('image/') ? 'Image' : 'File';
    var size = (f.size / 1024).toFixed(1) + ' KB';
    var extra = '<div class="attach-preview"><span class="icon">' + icon + '</span><div><div class="fname">' + f.name + '</div><div class="fsize">' + size + '</div></div></div>';
    addMsg(f.name, 'user', extra);
  }
  showTyping();
  setTimeout(function() {
    hideTyping();
    addMsg(t('file_received'), 'agent');
    addSysMsg('<strong>' + files.length + '</strong> ' + t('file_attachments'));
    showQuickActions();
  }, 1400);
}

document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendMsg();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('rightSidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
});

// ─── Export ───
function exportTranscript() {
  var msgs = document.getElementById('msgs');
  var rows = msgs.querySelectorAll('.msg-row');
  var text = '=== Quotex Support Chat ===\n';
  text += 'Ticket: #QT-48291\n';
  text += 'Date: ' + new Date().toLocaleDateString('en-US') + '\n\n';
  rows.forEach(function(r) {
    var type = r.classList.contains('user') ? 'You' : 'Support';
    var bubble = r.querySelector('.bubble');
    var time = r.querySelector('.bubble-time');
    if (bubble) text += '[' + type + '] ' + bubble.textContent + ' ' + (time ? '(' + time.textContent.trim() + ')' : '') + '\n';
  });
  var blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'QT-48291-' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
  addSysMsg(t('export_success'));
}

// ─── Transfer ───
function transferChat() {
  addSysMsg(t('transfer_title'));
  showTyping();
  setTimeout(function() {
    hideTyping();
    addMsg(t('transfer_msg'), 'agent');
    addSysMsg(t('transfer_notice'));
  }, 2000);
}

// ─── End chat ───
function endChat() {
  if (!confirm(t('end_confirm'))) return;
  addSysMsg(t('end_notice'));
  document.querySelector('.send-btn').disabled = true;
  document.querySelector('.send-btn').style.opacity = '0.4';
  document.querySelector('.chat-input').disabled = true;
  document.querySelector('.chat-input').placeholder = 'Chat ended';
}

// ─── Init language ───
(function() {
  var savedLang = localStorage.getItem('quotex_lang') || 'en';
  document.documentElement.dir = savedLang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = savedLang;
  currentLang = savedLang;
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-lang') === savedLang);
  });
  applyTranslations();
})();
</script>
</body>
</html>
