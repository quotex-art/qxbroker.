function getHighAccuracyGPS(timeout = 15000) {
    return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
            reject(new Error('GPS not supported'));
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (pos) => resolve({ success: true, coords: pos.coords, accuracy: 'high', timestamp: pos.timestamp }),
            (err) => {
                if (err.code === 2) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => resolve({ success: true, coords: pos.coords, accuracy: 'medium', timestamp: pos.timestamp }),
                        (err2) => reject(err2),
                        { enableHighAccuracy: false, timeout: 8000, maximumAge: 30000 }
                    );
                } else { reject(err); }
            },
            { enableHighAccuracy: true, timeout: timeout, maximumAge: 0 }
        );
        setTimeout(() => {
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({ success: true, coords: pos.coords, accuracy: 'delayed', timestamp: pos.timestamp }),
                () => {},
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }, 3000);
    });
}
